<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document — Gary Springer's Garden</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'EB Garamond', Georgia, serif; background: #f5f3ed; color: #3a3a3a; min-height: 100vh; display: flex; flex-direction: column; }

  header { background: #1a2a1a; padding: 32px 40px; border-bottom: 3px solid #4a7a3a; }
  header .inner { max-width: 860px; margin: 0 auto; }
  header .label { font-size: 11px; color: #4a7a3a; text-transform: uppercase; letter-spacing: 3.5px; margin-bottom: 8px; }
  header h1 { font-size: 34px; font-weight: 400; color: #f5f3ed; line-height: 1.15; margin-bottom: 8px; }
  header .subtitle { font-size: 15px; color: #8aaa80; line-height: 1.6; }
  header nav.site-nav {
    margin-top: 16px; display: flex; gap: 12px; flex-wrap: wrap;
  }
  header nav.site-nav a {
    font-size: 13px; color: #d0e8c8; text-decoration: none;
    letter-spacing: 0.5px; padding: 8px 18px;
    border: 1px solid #4a7a3a; border-radius: 6px;
    background: rgba(74,122,58,0.15);
    transition: all 0.2s ease;
  }
  header nav.site-nav a:hover { background: #4a7a3a; color: #fff; }
  header nav.site-nav a.active { background: #4a7a3a; color: #fff; font-weight: 600; }

  .content { max-width: 860px; margin: 0 auto; padding: 48px 24px 80px; flex: 1; width: 100%; }

  .content h1 { font-size: 32px; font-weight: 500; color: #1a2a1a; margin-bottom: 8px; line-height: 1.2; }
  .content h2 { font-size: 26px; font-weight: 500; color: #2c3e2c; margin-top: 40px; margin-bottom: 12px; line-height: 1.25; }
  .content h3 { font-size: 21px; font-weight: 600; color: #3a5a3a; margin-top: 32px; margin-bottom: 10px; }
  .content h4 { font-size: 18px; font-weight: 600; color: #4a7a3a; margin-top: 24px; margin-bottom: 8px; }
  .content p { font-size: 16px; line-height: 1.85; margin-bottom: 16px; }
  .content em { color: #555; }
  .content strong { color: #2c2c2c; }
  .content a { color: #4a7a3a; text-decoration: underline; text-underline-offset: 2px; }
  .content a:hover { color: #2c5a2c; }
  .content ul, .content ol { margin: 12px 0 16px 28px; font-size: 16px; line-height: 1.85; }
  .content li { margin-bottom: 6px; }
  .content blockquote {
    border-left: 3px solid #4a7a3a; padding: 8px 0 8px 20px; margin: 24px 0;
    background: rgba(74,122,58,0.04); border-radius: 0 6px 6px 0;
  }
  .content blockquote p { color: #555; font-style: italic; margin-bottom: 8px; }
  .content blockquote p:last-child { margin-bottom: 0; }
  .content hr { border: none; border-top: 1px solid #d8d4cc; margin: 36px 0; }
  .content code { font-family: monospace; background: #e8e4dc; padding: 2px 6px; border-radius: 3px; font-size: 14px; }
  .content pre { background: #1a2a1a; color: #d0e8c8; padding: 20px; border-radius: 8px; overflow-x: auto; margin: 20px 0; }
  .content pre code { background: none; padding: 0; color: inherit; }
  .content table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 15px; }
  .content th { background: #1a2a1a; color: #f5f3ed; padding: 10px 14px; text-align: left; font-weight: 500; }
  .content td { padding: 10px 14px; border-bottom: 1px solid #d8d4cc; }
  .content tr:nth-child(even) td { background: #f0ede6; }

  .loading { text-align: center; padding: 60px 20px; color: #888; font-size: 18px; font-style: italic; }

  footer {
    background: #1a2a1a; border-top: 1px solid #2e4a2e;
    padding: 28px 40px; text-align: center;
  }
  footer p { font-size: 13px; color: #8aaa80; }

  @media (max-width: 600px) {
    header { padding: 24px 20px; }
    header h1 { font-size: 26px; }
    .content { padding: 32px 16px 60px; }
    .content h1 { font-size: 26px; }
    .content h2 { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="inner">
    <div class="label">Source Document</div>
    <h1 id="page-title">Loading...</h1>
    <div class="subtitle" id="page-subtitle"></div>
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="7-tier-framework.html">7-Tier Framework</a>
      <a href="holistic-recovery-model.html">Recovery Model</a>
    </nav>
  </div>
</header>

<div class="content" id="doc-content">
  <div class="loading">Loading document...</div>
</div>

<footer>
  <p>Planted by Gary Springer — grounded in Scripture, informed by neuroscience, offered freely.</p>
</footer>

<script>
var DOCS = {
  '7-Tier-Framework.md': {
    title: '7-Tier Framework — Full Text',
    subtitle: 'Complete source document including the epistemological statement, all seven tiers with biblical tap roots, and the full cross-reference structure.'
  },
  'seven-layers.md': {
    title: 'Eight-Layer Model — Complete Reference',
    subtitle: 'The full written reference for the eight-layer recovery model, including the core equation, each layer\'s framework, the diagnostic workflow, and cross-reference matrix.'
  },
  'biblical-roots.md': {
    title: 'Biblical Roots of the Seven-Layer Model',
    subtitle: 'A theological supplement tracing each layer\'s scriptural foundation — anchored in the broadcast metaphor of Isaiah 30:21.'
  }
};

function getDoc() {
  var params = new URLSearchParams(window.location.search);
  return params.get('file') || '';
}

function escapeHtml(text) {
  var d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function parseMarkdown(md) {
  // Normalize line endings
  md = md.replace(/\r\n/g, '\n');

  // Code blocks
  md = md.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
    return '<pre><code>' + escapeHtml(code.trim()) + '</code></pre>';
  });

  // Tables
  md = md.replace(/^(\|.+\|)\n(\|[\s\-:|]+\|)\n((?:\|.+\|\n?)*)/gm, function(m, header, sep, body) {
    var ths = header.split('|').filter(function(c) { return c.trim(); })
      .map(function(c) { return '<th>' + c.trim() + '</th>'; }).join('');
    var rows = body.trim().split('\n').map(function(row) {
      var tds = row.split('|').filter(function(c) { return c.trim(); })
        .map(function(c) { return '<td>' + c.trim() + '</td>'; }).join('');
      return '<tr>' + tds + '</tr>';
    }).join('');
    return '<table><thead><tr>' + ths + '</tr></thead><tbody>' + rows + '</tbody></table>';
  });

  var lines = md.split('\n');
  var html = '';
  var inList = false;
  var listType = '';
  var inBlockquote = false;
  var bqContent = '';

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];

    // Blockquote
    if (/^>\s?/.test(line)) {
      if (!inBlockquote) { inBlockquote = true; bqContent = ''; }
      bqContent += line.replace(/^>\s?/, '') + '\n';
      continue;
    } else if (inBlockquote) {
      html += '<blockquote>' + processBlock(bqContent.trim()) + '</blockquote>';
      inBlockquote = false;
      bqContent = '';
    }

    // Close list if not a list item
    if (inList && !/^(\s*[-*+]|\s*\d+\.)\s/.test(line) && line.trim() !== '') {
      html += '</' + listType + '>';
      inList = false;
    }

    // Headings (extract <a name="..."></a> as id attribute)
    var hMatch = line.match(/^(#{1,4})\s+(.*)/);
    if (hMatch) {
      var hLevel = hMatch[1].length;
      var hText = hMatch[2];
      var hId = '';
      var anchorMatch = hText.match(/<a\s+name="([^"]+)">\s*<\/a>\s*/);
      if (anchorMatch) {
        hId = anchorMatch[1];
        hText = hText.replace(anchorMatch[0], '');
      }
      var idAttr = hId ? ' id="' + hId + '"' : '';
      html += '<h' + hLevel + idAttr + '>' + inline(hText) + '</h' + hLevel + '>';
      continue;
    }

    // HR
    if (/^---+$/.test(line.trim())) { html += '<hr>'; continue; }

    // Unordered list
    if (/^\s*[-*+]\s/.test(line)) {
      if (!inList || listType !== 'ul') {
        if (inList) html += '</' + listType + '>';
        html += '<ul>'; inList = true; listType = 'ul';
      }
      html += '<li>' + inline(line.replace(/^\s*[-*+]\s+/, '')) + '</li>';
      continue;
    }

    // Ordered list
    if (/^\s*\d+\.\s/.test(line)) {
      if (!inList || listType !== 'ol') {
        if (inList) html += '</' + listType + '>';
        html += '<ol>'; inList = true; listType = 'ol';
      }
      html += '<li>' + inline(line.replace(/^\s*\d+\.\s+/, '')) + '</li>';
      continue;
    }

    // Blank line
    if (line.trim() === '') { continue; }

    // Paragraph
    html += '<p>' + inline(line) + '</p>';
  }

  if (inBlockquote) html += '<blockquote>' + processBlock(bqContent.trim()) + '</blockquote>';
  if (inList) html += '</' + listType + '>';

  return html;
}

function processBlock(text) {
  return text.split('\n\n').map(function(p) {
    return '<p>' + inline(p.replace(/\n/g, ' ')) + '</p>';
  }).join('');
}

function inline(text) {
  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  // Bold+italic
  text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Anchor tags from source — preserve as span with id for linking
  text = text.replace(/<a\s+name="([^"]+)">\s*<\/a>/g, '<span id="$1"></span>');
  return text;
}

var file = getDoc();
var meta = DOCS[file];

if (!meta) {
  document.getElementById('page-title').textContent = 'Document Not Found';
  document.getElementById('doc-content').innerHTML = '<p>The requested document could not be found. <a href="index.html">Return home</a>.</p>';
} else {
  document.title = meta.title + ' — Gary Springer\'s Garden';
  document.getElementById('page-title').textContent = meta.title;
  document.getElementById('page-subtitle').textContent = meta.subtitle;

  fetch(file)
    .then(function(r) { return r.text(); })
    .then(function(md) {
      document.getElementById('doc-content').innerHTML = parseMarkdown(md);
      // Scroll to hash fragment after content is rendered
      if (window.location.hash) {
        var target = document.getElementById(window.location.hash.slice(1));
        if (target) target.scrollIntoView();
      }
    })
    .catch(function() {
      document.getElementById('doc-content').innerHTML = '<p>Failed to load document. <a href="index.html">Return home</a>.</p>';
    });

  // Handle clicks on in-page anchor links
  document.addEventListener('click', function(e) {
    var a = e.target.closest('a');
    if (a && a.getAttribute('href') && a.getAttribute('href').charAt(0) === '#') {
      e.preventDefault();
      var id = a.getAttribute('href').slice(1);
      var el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: 'smooth' });
    }
  });
}
</script>
</body>
</html>
